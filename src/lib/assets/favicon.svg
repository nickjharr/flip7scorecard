<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Dark rounded background -->
  <rect width="100" height="100" rx="18" fill="#030712"/>
  <!-- Back card (offset, blue) -->
  <rect x="28" y="20" width="48" height="62" rx="7" fill="#1d4ed8"/>
  <!-- Front card (white) -->
  <rect x="18" y="14" width="48" height="62" rx="7" fill="#ffffff"/>
  <!-- Corner 7 top-left -->
  <text x="25" y="34" font-family="system-ui, Arial, sans-serif" font-weight="900" font-size="16" fill="#1e3a8a">7</text>
  <!-- Large centre 7 -->
  <text x="42" y="68" font-family="system-ui, Arial, sans-serif" font-weight="900" font-size="44" text-anchor="middle" fill="#1e3a8a">7</text>
</svg>
